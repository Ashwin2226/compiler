<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="2; url=simulation.html">
    <title>WhatsApp Compiler | Ashwin</title>
    <style>
        body { 
            background-color: #111b21; 
            color: #e9edef; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
        }
        .wa-logo { width: 70px; height: 70px; margin-bottom: 30px; }
        .progress-container { width: 180px; height: 3px; background: #233138; border-radius: 5px; position: relative; overflow: hidden; }
        .progress-bar { 
            position: absolute; left: -100%; width: 100%; height: 100%; 
            background: #00a884; animation: wa-load 1.5s ease-in-out infinite; 
        }
        @keyframes wa-load { 100% { left: 100%; } }
        .footer { position: absolute; bottom: 50px; text-align: center; }
        .footer span { color: #8696a0; font-size: 13px; letter-spacing: 1px; }
        .name { color: #e9edef; font-weight: 700; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-logo" alt="WhatsApp">
    <div class="progress-container"><div class="progress-bar"></div></div>
    <div style="margin-top: 20px; font-size: 14px; color: #8696a0;">Loading Complete Compiler Pipeline...</div>
    <div class="footer">
        <span>FROM</span>
        <span class="name">ASHWIN</span>
    </div>
</body>
</html>
